<!DOCTYPE html>
<!-- DOCTYPE: Declaración obligatoria que indica al navegador que este documento usa HTML5.
     No es una etiqueta HTML, sino una instrucción. Debe ser siempre la primera línea. -->

<html lang="es">
<!-- <html>: Elemento raíz que envuelve todo el documento HTML.
     El atributo lang="es" indica el idioma (español). -->

  <head>
  <!-- <head>: Sección de cabecera del documento. Contiene metainformación que NO se
       muestra visualmente en la página, pero es necesaria para el navegador. -->

    <meta charset="UTF-8">
    <!-- <meta charset>: Define la codificación de caracteres del documento.
         UTF-8 permite mostrar correctamente tildes, ñ y caracteres de otros idiomas. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta viewport>: Controla cómo se visualiza la página en dispositivos móviles.
         width=device-width ajusta el ancho al dispositivo; initial-scale=1.0 fija el zoom inicial.
         Es imprescindible para un diseño adaptable. -->

    <title>Mi primera página web</title>
    <!-- <title>: Define el título que aparece en la pestaña del navegador
         y en los resultados de los buscadores. -->

  </head>
  <!-- </head>: Cierre de la sección de metainformación. -->

  <body>
  <!-- <body>: Contiene todo el contenido visible de la página web:
       textos, imágenes, enlaces, formularios, etc. Solo puede haber uno por documento. -->

    <header>
    <!-- <header>: Etiqueta semántica de HTML5. Representa la cabecera de la página.
         Suele contener el logotipo, el título del sitio y la navegación principal. -->

      <h1>Bienvenido a mi página web</h1>
      <!-- <h1>: Encabezado de nivel 1, el título principal de la página.
           Es el encabezado más importante. Por accesibilidad solo debe haber uno por página.
           Los niveles van de <h1> (mayor importancia) a <h6> (menor importancia). -->

    </header>

    <main>
    <!-- <main>: Etiqueta semántica de HTML5. Contiene el contenido principal y único de la página.
         Mejora la accesibilidad permitiendo a los lectores de pantalla saltar directamente al contenido. -->

      <p>Este es el contenido principal de la página.</p>
      <!-- <p>: Define un párrafo de texto. El navegador añade automáticamente
           un margen superior e inferior para separarlo del resto del contenido. -->

    </main>

    <footer>
    <!-- <footer>: Etiqueta semántica de HTML5. Representa el pie de página.-->

      <p>Pie de página</p>

    </footer>

  </body>
  <!-- </body>: Cierre del contenido visible de la página. -->

</html>
<!-- </html>: Cierre del elemento raíz. Es siempre la última línea del documento. -->
