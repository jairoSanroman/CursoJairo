<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uso de marcos y capas</title>

<style>

html, body{
    margin:0;
    height:100%;
}

.contenedor{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 200px 1fr;
    height:100vh;
}

.superior-izq{
    border:1px solid black;
    overflow:scroll;
}

.superior-der{
    border:1px solid black;
    overflow:hidden;
}

.inferior{
    grid-column:1 / 3;
    border:1px solid black;
    overflow:auto;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

</style>

</head>
<body>

<div class="contenedor">

    <header class="superior-izq">
        <iframe src="frame1.html"></iframe>
    </header>

    <nav class="superior-der">
        <iframe src="frame2.html"></iframe>
    </nav>

    <main class="inferior">
        <iframe name="contenido" src="frame3.html"></iframe>
    </main>

</div>

</body>
</html>
