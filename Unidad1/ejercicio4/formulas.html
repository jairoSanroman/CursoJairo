<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resolución de fórmulas en una Web</title>
</head>
<!-- El atributo bgcolor en la etiqueta body permite definir el fondo de la página -->
<body bgcolor="gray">

    <h2>Fórmula de la ecuación de segundo grado</h2>
    <p>
        <!-- La etiqueta font con el atributo color permite cambiar el color del texto sin CSS -->
        <font color="red">
            x = (-b &plusmn; &radic;(b<sup>2</sup> - 4ac)) / 2a
        </font>
    </p>

    <h2>Fórmula química del agua</h2>
    <p>
        <font color="blue">
            H<sub>2</sub>O
        </font>
    </p>

    <!-- Comentario final según el enunciado -->
    <!-- Este texto es un comentario y no se visualizará en el navegador -->
</body>
</html>
