<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejemplo de listas anidadas</title>
</head>
<body>

  <h1>Ejemplo de listas anidadas</h1>
  <!-- <h1>: Encabezado principal de la página. -->

  <p>Lista con distintos tipos de alimentos:</p>

  <ol>
    <!-- <ol>: Lista ordenada. Cada tipo de alimento se numera automáticamente. -->

    <li>Verdura.
      <ul>
        <!-- <ul> anidada dentro de <li>: lista no ordenada con los ejemplos de cada alimento. -->
        <li>Tomate.</li>
        <li>Zanahoria.</li>
        <li>Lechuga.</li>
      </ul>
    </li>

    <li>Fruta.
      <ul>
        <li>Pera.</li>
        <li>Manzana.</li>
        <li>Melón.</li>
      </ul>
    </li>

    <li>Pescado.
      <ul>
        <li>Sardina.</li>
        <li>Boquerón.</li>
        <li>Rosada.</li>
      </ul>
    </li>

  </ol>
  <!-- Las listas anidadas se crean colocando una <ul> o <ol> dentro de un <li>.
       El navegador aplica automáticamente la sangría y cambia el estilo de viñeta. -->

</body>
</html>
