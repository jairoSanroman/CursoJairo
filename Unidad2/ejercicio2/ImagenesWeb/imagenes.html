<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imágenes en la Web</title>
</head>
<body>

    <h1>Imágenes en la Web</h1>

    <!-- Imagen de un cangrejo -->
    <h2>Cangrejo tamaño original</h2>

    <img src="img/cangrejo.jpg"
         alt="Imagen de un cangrejo">

    <br><br>

    <!-- Misma imagen más pequeña -->
    <h2>Cangrejo tamaño reducido</h2>

    <img src="img/cangrejo.jpg"
         alt="Imagen de un cangrejo"
         width="200">

    <br><br>

    <!-- Imagen de una pelota con enlace -->
    <h2>Enlace a una web deportiva</h2>

    <a href="https://www.marca.com" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg"
             alt="Pelota de fútbol"
             width="150">
    </a>

</body>
</html>
<!-- Pregunta d) Etiquetas y atributos necesarios para insertar imágenes

Etiqueta principal:

<img>

Atributos más utilizados:

Atributo	Función
src	Indica la ruta de la imagen
alt	Texto alternativo para accesibilidad
width	Ancho de la imagen
height	Alto de la imagen
title	Texto que aparece al pasar el ratón -->
