<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería de imágenes</title>

    <style>
        h1{
            background-color:pink;
            text-align:center;
            padding:10px;
        }

        .galeria{
            background-color:black;
            padding:20px;
            text-align:center;
        }

        .galeria img{
            width:100px;
            height:100px;
            margin:2px;
        }
    </style>
</head>

<body>

    <h1>Galería de imágenes</h1>

    <div class="galeria">

        <a href="img/flor1.jpg" target="_blank">
            <img src="img/flor1.jpg" alt="Flor 1">
        </a>

        <a href="img/flor2.jpg" target="_blank">
            <img src="img/flor2.jpg" alt="Flor 2">
        </a>

        <a href="img/flor3.jpg" target="_blank">
            <img src="img/flor3.jpg" alt="Flor 3">
        </a>

        <a href="img/flor4.jpg" target="_blank">
            <img src="img/flor4.jpg" alt="Flor 4">
        </a>

    </div>

</body>
</html>
