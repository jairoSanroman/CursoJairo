<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa de imágenes</title>
</head>
<body>

<h1>Mapa de imágenes</h1>

<img src="cuadrados.png" alt="Mapa de colores"
     usemap="#mapacolores">

<map name="mapacolores">

    <!-- Arriba izquierda -->
    <area shape="rect"
          coords="0,0,112,112"
          href="https://www.google.com"
          alt="Google">

    <!-- Arriba derecha -->
    <area shape="rect"
          coords="112,0,225,112"
          href="https://www.wikipedia.org"
          alt="Wikipedia">

    <!-- Abajo izquierda -->
    <area shape="rect"
          coords="0,112,112,225"
          href="https://www.youtube.com"
          alt="YouTube">

    <!-- Abajo derecha -->
    <area shape="rect"
          coords="112,112,225,225"
          href="https://www.github.com"
          alt="GitHub">

</map>
</body>
</html>
